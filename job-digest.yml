name: Job digest

# Runs automatically every day at 20:00 UTC (= 8:00am Fiji, FJT) and can be
# triggered by hand from the Actions tab. Free on a public or private repo.
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Restore the "already emailed" memory from the previous run.
      - name: Restore seen-cache
        uses: actions/cache/restore@v4
        with:
          path: seen.json
          key: seen-${{ github.run_id }}
          restore-keys: seen-

      - name: Run agent
        env:
          RECIPIENT: ${{ secrets.RECIPIENT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python job_agent.py

      # Save the updated memory so tomorrow's run won't repeat today's jobs.
      - name: Save seen-cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen.json
          key: seen-${{ github.run_id }}
